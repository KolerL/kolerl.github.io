    <style>
        @keyframes drop {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        * {
            box-sizing: border-box;
        }

        html {
            padding: 0;
            margin: 0;
            background: #fafafa;
            --image-size: 250px;
            --icon-size: 40px;
            --icon-padding: 8px;
        }

        body {
            padding: 0;
            margin: 0;
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #main_outer {
            position: relative;
            bottom: calc((100vh - 350px)/4);
        }

        #main {
            display: inline-flex;
            flex-direction: row;
        }

        .icon {
            display: inline-block;
            width: var(--icon-size);
            padding: var(--icon-padding);
            box-sizing: border-box;
            flex: none;
            animation-duration: 0.5s;
            animation-timing-function: ease;
            animation-fill-mode: forwards;
            animation-name: drop;
            opacity: 0;
        }

        .icon:hover {
            box-shadow: 1px 1px 4px 0px #555;
        }

        .icon svg {
            fill: white;
        }

        img {
            outline: 2px solid white;
            box-shadow: 0 0 4px #424242;
            width: 501px;
            height: 409px;
        }

        #iconstrip.right {
            margin-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #iconstrip.bottom {
            margin-top: 15px;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
        }

        .instagram {
            margin-left: 15px !important;
        }

        #iconstrip.right .icon + .icon {
            margin-top: 10px;
        }

        #iconstrip.bottom .icon + .icon {
            margin-left: 10px;
        }

        .icon.twitter {
            animation-delay: 0.1s
        }

        .icon.facebook {
            animation-delay: 0.15s
        }

        .icon.github {
            animation-delay: 0.2s
        }

        .icon.instagram {
            animation-delay: 0.25s
        }

        .icon.homepage {
            animation-delay: 0.25s
        }
    </style>
